name: check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  workbench:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Static checks
        run: make check

      - name: Runtime tests
        run: make test

      - name: Artifact scan
        run: make scan-artifacts
